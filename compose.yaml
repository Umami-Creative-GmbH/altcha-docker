services:
  server:
    build:
      context: .
      target: api
    environment:
      SECRET: ${SECRET:-secret.key}
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      MAXNUMBER: ${MAXNUMBER:-5000}
    ports:
      - "3000:3000"

  demo:
    build:
      context: .
      target: demo
    environment:
      NODE_ENV: production
      API_BASE_URL: http://server:3000
    depends_on:
      - server
    ports:
      - "8080:8080"
